<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>循环柜预警</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <nav class="sidebar" aria-label="主导航">
        <div class="menu-group-title">循环柜预报</div>
        <button class="tab-button active" data-tab="overview" type="button">
          <span class="tab-icon" aria-hidden="true">▦</span>
          循环柜总览
        </button>
      </nav>

      <main class="page-shell" id="tab-overview">
        <section class="overview-panel" aria-label="循环柜总览">
          <div class="overview-header">
            <div>
              <h1>循环柜总览</h1>
              <p>按客户和仓库聚合最新预报时间与柜量，点击单元格可下钻到明细。</p>
            </div>
            <div class="overview-meta" id="overviewMeta">共 0 个客户</div>
          </div>

          <div class="overview-search">
            <label class="field" style="max-width: 260px;">
              <span>客户简称</span>
              <select id="overviewCustomerSearch">
                <option value="">全部客户</option>
              </select>
            </label>
          </div>

          <div class="matrix-wrap">
            <table class="matrix-table" id="overviewMatrix">
              <thead id="overviewHead"></thead>
              <tbody id="overviewBody"></tbody>
            </table>
            <div id="overviewEmptyState" class="empty-state" hidden>暂无总览数据</div>
          </div>
        </section>
      </main>

      <main class="page-shell" id="tab-details" hidden>
        <section class="search-panel" aria-label="搜索筛选">
          <div class="search-row">
            <label class="field field-wide">
              <span>关键词</span>
              <input id="keywordInput" type="search" placeholder="预报单号、柜号、系统柜号" autocomplete="off" />
            </label>
            <label class="field">
              <span>客户名称</span>
              <input id="customerInput" type="text" placeholder="如 TTTX" autocomplete="off" />
            </label>
            <label class="field">
              <span>业务员</span>
              <input id="salespersonInput" type="text" placeholder="如 jessie" autocomplete="off" />
            </label>
            <label class="field">
              <span>字段类型</span>
              <select id="orderTypeSelect">
                <option value="">全部字段类型</option>
              </select>
            </label>
            <label class="field">
              <span>运单状态</span>
              <select id="statusSelect">
                <option value="">全部运单状态</option>
              </select>
            </label>
            <label class="field">
              <span>预警状态</span>
              <select id="warningStatusSelect">
                <option value="">全部预警状态</option>
              </select>
            </label>
            <label class="field">
              <span>创建时间</span>
              <input id="createdAtInput" type="text" placeholder="如 2026-06-14" autocomplete="off" />
            </label>
            <label class="field">
              <span>集装箱类型</span>
              <select id="typeSelect">
                <option value="">全部类型</option>
              </select>
            </label>
            <label class="field">
              <span>仓库</span>
              <select id="warehouseSelect">
                <option value="">全部仓库</option>
              </select>
            </label>
            <label class="field">
              <span>提柜地点</span>
              <select id="pickupSelect">
                <option value="">全部地点</option>
              </select>
            </label>
            <div class="actions" aria-label="搜索操作">
              <button id="searchButton" class="btn primary" type="button">搜索</button>
              <button id="resetButton" class="btn" type="button">重置</button>
            </div>
          </div>
        </section>

        <section class="table-section" aria-label="预报明细列表">
          <div class="table-toolbar">
            <div class="table-primary-actions">
              <button id="backButton" class="btn back-btn" type="button">← 返回总览</button>
              <button id="exportButton" class="btn" type="button">导出</button>
              <div class="summary">
                <strong>预报明细列表</strong>
                <span id="resultSummary">共 0 条</span>
              </div>
            </div>
            <div class="table-actions">
              <div class="selection-info" id="selectionInfo">已选 0 条</div>
            </div>
          </div>

          <div class="warehouse-tabs" aria-label="仓库筛选">
            <button class="warehouse-tab active" type="button" data-warehouse="">全部</button>
            <button class="warehouse-tab" type="button" data-warehouse="洛杉矶仓">洛杉矶仓</button>
            <button class="warehouse-tab" type="button" data-warehouse="芝加哥仓">芝加哥仓</button>
            <button class="warehouse-tab" type="button" data-warehouse="新泽西仓">新泽西仓</button>
            <button class="warehouse-tab" type="button" data-warehouse="萨凡纳仓">萨凡纳仓</button>
            <button class="warehouse-tab" type="button" data-warehouse="休斯顿仓">休斯顿仓</button>
            <button class="warehouse-tab" type="button" data-warehouse="奥克兰仓">奥克兰仓</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="col-index">#</th>
                  <th class="col-check">
                    <input id="selectAll" type="checkbox" aria-label="全选" />
                  </th>
                  <th>客户名称</th>
                  <th>
                    <button class="sort-button" type="button" data-sort="bookingNo">
                      预报单号 <span class="sort-mark" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th>提柜地点</th>
                  <th>仓库</th>
                  <th>码头</th>
                  <th>火车站</th>
                  <th>库点数量</th>
                  <th>中转仓</th>
                  <th>集装箱类型</th>
                  <th>柜号</th>
                  <th>系统柜号</th>
                  <th>业务员</th>
                  <th>字段类型</th>
                  <th>运单状态</th>
                  <th>
                    <button class="sort-button" type="button" data-sort="createdAt">
                      创建时间 <span class="sort-mark" aria-hidden="true"></span>
                    </button>
                  </th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state" hidden>暂无匹配数据</div>
          </div>
        </section>
      </main>

    </div>

    <script src="script.js"></script>
  </body>
</html>
